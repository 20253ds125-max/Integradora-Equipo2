<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Online | Asignacion de mesas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/operaciones.css" />
  </head>
  <body>
    <header class="app-header"><a class="brand" href="index.html">Event Online</a>
      <nav><a href="catalogo.html">Explorar</a>
        <a href="index.html#favoritos">Favoritos</a><a href="ticket.html">Ticket</a>
        <a class="active" href="mesas.html">Mesas</a>
        <a href="admin.html">Admin</a></nav><div class="header-actions">
        <button type="button" data-save-layout>Guardar layout</button><a class="avatar" href="login.html" aria-label="Perfil"></a>
      </div>
    </header>

    <main class="seating-shell">
      <aside class="guest-panel">
        <h1>Invitados</h1>
        <section class="guest-import">
          <label for="guestImport">Lista del cliente</label>
          <textarea id="guestImport" data-guest-import placeholder="Pega aqui la lista, un invitado por linea"></textarea>
          <div class="guest-import-actions">
            <button class="primary-button compact" type="button" data-import-guests>Cargar lista</button>
            <button class="outline-button compact" type="button" data-clear-guests>Limpiar</button>
          </div>
          <p data-guest-import-status>Las mesas tienen 10 lugares cada una.</p>
        </section>
        <input type="search" placeholder="Buscar invitado..." data-guest-search />
        <div class="guest-list" data-guest-list></div>
        <div class="assigned-meter"><span data-assigned-count>0</span> / <span data-total-count>0</span> asignados<div class="meter"><span data-meter-bar style="width:0%"></span></div></div>
      </aside>
      <section class="floor-plan"><div class="tables-area" data-tables-area></div><div class="seating-actions"><button class="outline-button" type="button" data-add-table>Agregar mesa</button><button class="primary-button" type="button" data-save-layout-bottom>Guardar layout</button></div></section>
    </main>
    <footer class="rights-footer">&copy; 2026 GEDS Spaces. Todos los derechos reservados.</footer>
    <script src="assets/js/mesas.js"></script>
  </body>
</html>
